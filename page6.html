<!DOCTYPE html>
<html>
<head>
    <title>Blinking Button</title>
    <style>
        #myButton {
            position: absolute;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

<button id="myButton">no</button>

<script>
    const button = document.getElementById('myButton');
    const screenWidth = window.innerWidth - 100; // button width ke liye adjustment
    const screenHeight = window.innerHeight - 50; // button height ke liye adjustment

    function moveButton() {
        // Random x, y coordinates generate karna
        const x = Math.floor(Math.random() * screenWidth);
        const y = Math.floor(Math.random() * screenHeight);
        
        button.style.left = x + 'px';
        button.style.top = y + 'px';
        
        // Blink effect
        button.style.visibility = 'hidden';
        setTimeout(() => {
            button.style.visibility = 'visible';
        }, 200); // 200ms ke liye disappear
    }

    // 1 second me baar-baar blink aur move
    setInterval(moveButton, 1000);
</script>

</body>
</html>
